name: Daily Lunch Reminder

on:
  schedule:
    # 한국 시간 오전 11:00 (UTC 02:00), 월-금 실행
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전으로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전으로 업데이트
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # <--- 여기서 직접 설치하므로 파일이 없어도 됩니다!

      - name: Run script
        env:
          MM_WEBHOOK_URL: ${{ secrets.MM_WEBHOOK_URL }}
        run: python lunch_bot.py
